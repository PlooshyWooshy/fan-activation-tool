<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HUGO BOSS x NHL Fan Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

  <div class="controls">
    <h1>#HUGOBOSSNHL</h1>

    <input type="file" id="upload" accept="image/*">

    <h3>Select Template</h3>
    <div class="templates">
      <img src="template1.png" onclick="setTemplate('template1.png')">
      <img src="template2.png" onclick="setTemplate('template2.png')">
      <img src="template3.png" onclick="setTemplate('template3.png')">
    </div>

    <label>Zoom</label>
    <input type="range" id="zoom" min="0.5" max="2" step="0.01">

    <button onclick="download()">Download</button>
  </div>

  <div class="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
